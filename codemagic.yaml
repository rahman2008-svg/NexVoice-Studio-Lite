workflows:
  android-workflow:
    name: NexVoice Studio Lite Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

      vars:
        PACKAGE_NAME: "com.nexvoice.studio.lite"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.pub-cache

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Check project structure
        script: |
          ls -la

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Clean project
        script: |
          flutter clean

      - name: Build APK (Release)
        script: |
          flutter build apk --release

      - name: Build App Bundle (AAB)
        script: |
          flutter build appbundle --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - nexvora.builds@gmail.com
        notify:
          success: true
          failure: true