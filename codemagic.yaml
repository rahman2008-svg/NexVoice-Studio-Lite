workflows:
  android-workflow:
    name: NexVoice Studio Lite Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Check project structure
        script: |
          ls -la
          ls app || true

      - name: Grant Gradle permission
        script: |
          chmod +x ./gradlew || true

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK (safe fallback)
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease || true

      - name: Build AAB (Play Store)
        script: |
          ./gradlew bundleRelease || true

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - nexvora.builds@gmail.com
        notify:
          success: true
          failure: true
