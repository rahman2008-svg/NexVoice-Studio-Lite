workflows:
  android-workflow:
    name: NexVoice Studio Lite Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Check project structure
        script: |
          ls -la

      - name: Make Gradle executable
        script: |
          chmod +x ./gradlew

      - name: Clean build
        script: |
          ./gradlew clean

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

      - name: Build AAB (Play Store)
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - nexvora.builds@gmail.com
        notify:
          success: true
          failure: true
